<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DubStudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        /* Animated background particles */
        .bg-animation {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-delay: 4s; }
        .particle:nth-child(4) { left: 40%; animation-delay: 6s; }
        .particle:nth-child(5) { left: 50%; animation-delay: 8s; }
        .particle:nth-child(6) { left: 60%; animation-delay: 10s; }
        .particle:nth-child(7) { left: 70%; animation-delay: 12s; }
        .particle:nth-child(8) { left: 80%; animation-delay: 14s; }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
            }
        }

        .auth-container {
            position: relative;
            z-index: 1;
            width: 100%;
            padding: 2rem 1rem;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .form-control {
            padding: 0.85rem 1rem;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.15);
            transform: translateY(-2px);
        }

        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .form-text {
            color: #888;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .btn-primary {
            padding: 0.85rem 2rem;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #ddd;
        }

        .divider span {
            padding: 0 1rem;
            color: #999;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .social-login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: white;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
            gap: 0.5rem;
        }

        .social-login-btn:hover {
            border-color: #667eea;
            background: #f8f9ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-login-btn i {
            font-size: 1.2rem;
        }

        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }

        a {
            color: #667eea;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #764ba2;
        }

        .back-link {
            color: rgba(255, 255, 255, 0.9);
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-link:hover {
            color: white;
            transform: translateX(-5px);
        }

        h4 {
            color: #333;
            font-weight: 700;
        }

        .welcome-subtitle {
            color: #666;
            font-size: 0.95rem;
        }

        /* Input icons */
        .input-group-icon {
            position: relative;
        }

        .input-group-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
            z-index: 10;
        }

        .input-group-icon .form-control {
            padding-left: 45px;
        }

        /* Password strength indicator */
        .password-strength {
            height: 4px;
            border-radius: 2px;
            background: #e0e0e0;
            margin-top: 0.5rem;
            overflow: hidden;
            display: none;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .password-strength.weak .password-strength-bar {
            width: 33%;
            background: #ff4757;
        }

        .password-strength.medium .password-strength-bar {
            width: 66%;
            background: #ffa502;
        }

        .password-strength.strong .password-strength-bar {
            width: 100%;
            background: #2ed573;
        }

        /* Loading animation */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .btn-primary.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spinner 0.6s linear infinite;
        }

        @keyframes spinner {
            to { transform: rotate(360deg); }
        }

        /* Alert messages */
        .alert-message {
            padding: 0.75rem 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        .alert-message.show {
            display: block;
        }

        .alert-message.error {
            background: #ffe5e5;
            color: #cc0000;
            border: 1px solid #ffcccc;
        }

        .alert-message.success {
            background: #e5ffe5;
            color: #00cc00;
            border: 1px solid #ccffcc;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .auth-card {
                padding: 2rem 1.5rem;
            }
            
            .gradient-text {
                font-size: 1.5rem;
            }

            body {
                padding: 1rem 0;
            }
        }

        @media (max-width: 576px) {
            .auth-card {
                padding: 1.5rem 1rem;
            }
        }

        /* Checkbox custom style */
        .form-check-label {
            font-size: 0.9rem;
            color: #666;
        }

        .form-check-input {
            cursor: pointer;
            width: 1.1rem;
            height: 1.1rem;
        }

        .form-check {
            padding-left: 1.8rem;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="auth-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-6">
                    <div class="auth-card">
                        <!-- Logo & Header -->
                        <div class="text-center mb-4">
                            <a href="/" class="text-decoration-none">
                                <div class="logo-icon d-inline-flex">
                                    <i class="bi bi-play-circle-fill"></i>
                                </div>
                                <h3 class="gradient-text d-inline-block ms-2 mb-0">DubStudio</h3>
                            </a>
                            <h4 class="mt-4 mb-2">Create Account</h4>
                            <p class="welcome-subtitle">Start your free trial today</p>
                        </div>

                        <!-- Alert Message -->
                        <div id="alertMessage" class="alert-message"></div>
                        
                        <!-- Signup Form -->
                        <form onsubmit="handleSignup(event)" id="signupForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        <i class="bi bi-person"></i> First Name
                                    </label>
                                    <div class="input-group-icon">
                                        <i class="bi bi-person"></i>
                                        <input type="text" id="firstName" class="form-control" placeholder="John" required>
                                    </div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        <i class="bi bi-person"></i> Last Name
                                    </label>
                                    <div class="input-group-icon">
                                        <i class="bi bi-person"></i>
                                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-envelope"></i> Email Address
                                </label>
                                <div class="input-group-icon">
                                    <i class="bi bi-envelope"></i>
                                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-lock"></i> Password
                                </label>
                                <div class="input-group-icon">
                                    <i class="bi bi-lock"></i>
                                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required oninput="checkPasswordStrength()">
                                </div>
                                <div class="form-text">Must be at least 8 characters</div>
                                <div id="passwordStrength" class="password-strength">
                                    <div class="password-strength-bar"></div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    <i class="bi bi-lock-fill"></i> Confirm Password
                                </label>
                                <div class="input-group-icon">
                                    <i class="bi bi-lock-fill"></i>
                                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                                </div>
                            </div>
                            <div class="mb-3 form-check">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label" for="terms">
                                    I agree to the <a href="#" class="text-decoration-none">Terms & Conditions</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                                </label>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3 position-relative">
                                <i class="bi bi-person-plus me-2"></i>Create Account
                            </button>
                        </form>
                        
                        <!-- Divider -->
                        <div class="divider">
                            <span>OR SIGN UP WITH</span>
                        </div>
                        
                        <!-- Social Signup -->
                        <div class="d-grid gap-2 mb-3">
                            <button class="social-login-btn" onclick="handleSocialSignup('google')">
                                <i class="bi bi-google"></i>
                                <span>Sign up with Google</span>
                            </button>
                            <button class="social-login-btn" onclick="handleSocialSignup('github')">
                                <i class="bi bi-github"></i>
                                <span>Sign up with GitHub</span>
                            </button>
                        </div>
                        
                        <!-- Login Link -->
                        <p class="text-center text-muted mb-0">
                            Already have an account? <a href="/login" class="text-decoration-none fw-bold">Sign in</a>
                        </p>
                    </div>
                    
                    <!-- Back to Home -->
                    <div class="text-center mt-3">
                        <a href="/" class="back-link text-decoration-none">
                            <i class="bi bi-arrow-left"></i>
                            <span>Back to Home</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.textContent = message;
            alertDiv.className = `alert-message ${type} show`;
            
            setTimeout(() => {
                alertDiv.classList.remove('show');
            }, 4000);
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthDiv = document.getElementById('passwordStrength');
            
            if (password.length === 0) {
                strengthDiv.style.display = 'none';
                strengthDiv.className = 'password-strength';
                return;
            }
            
            strengthDiv.style.display = 'block';
            
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/) && password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            strengthDiv.className = 'password-strength';
            if (strength <= 2) {
                strengthDiv.classList.add('weak');
            } else if (strength === 3) {
                strengthDiv.classList.add('medium');
            } else {
                strengthDiv.classList.add('strong');
            }
        }

        function handleSignup(event) {
            event.preventDefault();
            
            // Get form values
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match!', 'error');
                return;
            }
            
            // Validate password length
            if (password.length < 8) {
                showAlert('Password must be at least 8 characters!', 'error');
                return;
            }

            const submitBtn = event.target.querySelector('button[type="submit"]');
            submitBtn.classList.add('loading');
            
            // Simulate loading
            setTimeout(() => {
                // Save user data to localStorage
                const userData = {
                    name: `${firstName} ${lastName}`,
                    email: email
                };
                localStorage.setItem('user', JSON.stringify(userData));
                
                showAlert('Account created successfully!', 'success');
                
                // Redirect to dashboard using Flask route
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1000);
            }, 1000);
        }

        function handleSocialSignup(provider) {
            console.log(`Signing up with ${provider}`);
            // Add your social signup logic here
        }

        // Add input focus animations
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transition = 'transform 0.2s ease';
                this.parentElement.style.transform = 'scale(1.02)';
            });
            
            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'scale(1)';
            });
        });

        // Email validation on blur
        document.getElementById('email').addEventListener('blur', function() {
            const email = this.value;
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (email && !emailPattern.test(email)) {
                this.style.borderColor = '#ff4757';
            } else if (email) {
                this.style.borderColor = '#2ed573';
            }
        });
    </script>
</body>
</html>
