<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - DubStudio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }

        .container-main {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .brand-icon {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
        }

        .brand-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e293b;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1rem;
        }

        .user-name {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }

        /* Main Card */
        .main-card {
            background: white;
            border-radius: 20px;
            padding: 4rem 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 1rem;
        }

        .main-subtitle {
            font-size: 1.125rem;
            color: #64748b;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 1.25rem 3rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.125rem;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5);
            color: white;
        }

        .cta-button i {
            font-size: 1.5rem;
        }

        /* Footer */
        .footer {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        .footer-btn {
            background: white;
            color: #64748b;
            border: none;
            padding: 0.875rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .footer-btn:hover {
            background: #f8fafc;
            color: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .footer-btn.logout {
            background: #fee2e2;
            color: #dc2626;
        }

        .footer-btn.logout:hover {
            background: #fecaca;
            color: #b91c1c;
        }

        @media (max-width: 768px) {
            body {
                padding: 1rem;
            }

            .header {
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }

            .main-card {
                padding: 3rem 2rem;
            }

            .main-title {
                font-size: 2rem;
            }

            .footer {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container-main">
        <!-- Header -->
        <div class="header">
            <a href="/" class="brand">
                <div class="brand-icon">
                    <i class="bi bi-play-circle-fill"></i>
                </div>
                <span class="brand-text">DubStudio</span>
            </a>
            <div class="user-section">
                <span class="user-name" id="userName">Demo User</span>
                <div class="user-avatar">
                    <span id="userInitials">DU</span>
                </div>
            </div>
        </div>

        <!-- Main Card -->
        <div class="main-card">
            <div class="welcome-icon">
                <i class="bi bi-play-btn-fill"></i>
            </div>
            <h1 class="main-title">Welcome to DubStudio</h1>
            <p class="main-subtitle">
                Transform your videos with AI-powered dubbing.<br>
                Translate and dub your content into multiple languages instantly.
            </p>
            <a href="/studio" class="cta-button">
                <i class="bi bi-plus-circle-fill"></i>
                <span>Start New Project</span>
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <a href="/" class="footer-btn">
                <i class="bi bi-house-fill"></i>
                <span>Home</span>
            </a>
            <button class="footer-btn logout" onclick="logout()">
                <i class="bi bi-box-arrow-right"></i>
                <span>Logout</span>
            </button>
        </div>
    </div>

    <script>
        // Load user data
        window.onload = function() {
            const userData = localStorage.getItem('user');
            if (userData) {
                const user = JSON.parse(userData);
                document.getElementById('userName').textContent = user.name || 'Demo User';
                const initials = (user.name || 'Demo User')
                    .split(' ')
                    .map(n => n[0])
                    .join('')
                    .toUpperCase()
                    .substring(0, 2);
                document.getElementById('userInitials').textContent = initials;
            }
        };

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('user');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
